services:
  db:
    image: postgres:16-alpine
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: auth_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d auth_test"]
      interval: 2s
      timeout: 5s
      retries: 10
